services:
  - type: web
    name: usas-due-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: usas-due-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false

databases:
  - name: usas-due-db
    plan: free
